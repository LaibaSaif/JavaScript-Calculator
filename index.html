<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
            font-size: 1.5rem;
        }
        #container{
            margin-left: 300px;
            display: flex;
            justify-self: center;
            flex-direction: column;
            align-items: center;
            width: 50%;
            height: 70%;
            border: 3px solid black;
            background-color: aqua;
            justify-content: space-evenly;
            gap: 15px;
        }
        #content{
            margin: 10px;
            padding: 16px;
            border: 2px solid blue;
        }
        input{
            padding: 1vw;
            border: 2px solid beige;
            border-radius: 2%;
        }
        button{
            width: 60px;
            border-radius: 20%;
            border: 2px solid burlywood;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="content">Result = 0</div>
        <input id="num1" type="number" placeholder="Enter number 1">
        <input id="num2" type="number" placeholder="Enter number 2">
        <button onclick="Add()">+</button>
        <button onclick="Sub()">-</button>
        <button onclick="Mul()">*</button>
        <button onclick="Div()">/</button>
    </div>

    <script>
        // Function to add two numbers
        function Add(){
            let number1 = Number(document.getElementById("num1").value);  // Convert to number
            let number2 = Number(document.getElementById("num2").value);  // Convert to number
            let result = number1 + number2; 
            document.getElementById("content").innerHTML = `Result = ${result}`;  // Display result
        }

        // Function to subtract two numbers
        function Sub(){
            let number1 = Number(document.getElementById("num1").value);  // Convert to number
            let number2 = Number(document.getElementById("num2").value);  // Convert to number
            let result = number1 - number2; 
            document.getElementById("content").innerHTML = `Result = ${result}`;  // Display result
        }

        // Function to multiply two numbers
        function Mul(){
            let number1 = Number(document.getElementById("num1").value);  // Convert to number
            let number2 = Number(document.getElementById("num2").value);  // Convert to number
            let result = number1 * number2; 
            document.getElementById("content").innerHTML = `Result = ${result}`;  // Display result
        }

        // Function to divide two numbers
        function Div(){
            let number1 = Number(document.getElementById("num1").value);  // Convert to number
            let number2 = Number(document.getElementById("num2").value);  // Convert to number
            if (number2 === 0) {
                document.getElementById("content").innerHTML = "Error: Division by zero is not allowed";  // Division by zero check
            } else {
                let result = number1 / number2; 
                document.getElementById("content").innerHTML = `Result = ${result}`;  // Display result
            }
        }
    </script>
</body>
</html>
